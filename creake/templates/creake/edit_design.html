{% extends 'creake/base_dashboard.html' %}
{% block title %}Edit Design{% endblock %}
{% block nav_designs %}active{% endblock %}

{% block content %}

<div>
  <div class="section-title">&#9999;&#65039; Edit Design</div>
  <div class="section-sub">Update your custom cake design.</div>
</div>

<div style="max-width:540px;">
  <div class="profile-card">
    <form method="post" action="{% url 'creake:edit_design' design.id %}">
      {% csrf_token %}

      <div class="pf-field">
        <label>Design Name</label>
        <input type="text" name="name" value="{{ design.name }}" placeholder="e.g. My Birthday Cake" required>
      </div>

      <div class="pf-field">
        <label>Emoji / Icon</label>
        <select name="emoji">
          <option value="🎂" {% if design.emoji == '🎂' %}selected{% endif %}>🎂 Birthday Cake</option>
          <option value="🍰" {% if design.emoji == '🍰' %}selected{% endif %}>🍰 Slice of Cake</option>
          <option value="🧁" {% if design.emoji == '🧁' %}selected{% endif %}>🧁 Cupcake</option>
          <option value="🍫" {% if design.emoji == '🍫' %}selected{% endif %}>🍫 Chocolate</option>
          <option value="🍓" {% if design.emoji == '🍓' %}selected{% endif %}>🍓 Strawberry</option>
          <option value="🌸" {% if design.emoji == '🌸' %}selected{% endif %}>🌸 Floral</option>
          <option value="⭐" {% if design.emoji == '⭐' %}selected{% endif %}>⭐ Special</option>
          <option value="❤️" {% if design.emoji == '❤️' %}selected{% endif %}>❤️ Romance</option>
        </select>
      </div>

      <div class="pf-field">
        <label>Number of Layers</label>
        <select name="layers">
          <option value="1" {% if design.layers == 1 %}selected{% endif %}>1 Layer</option>
          <option value="2" {% if design.layers == 2 %}selected{% endif %}>2 Layers</option>
          <option value="3" {% if design.layers == 3 %}selected{% endif %}>3 Layers</option>
          <option value="4" {% if design.layers == 4 %}selected{% endif %}>4 Layers</option>
        </select>
      </div>

      <div class="pf-field">
        <label>Description (Optional)</label>
        <textarea name="description" placeholder="Describe your cake design...">{{ design.description }}</textarea>
      </div>

      <div style="display:flex;gap:12px;margin-top:20px;">
        <a href="{% url 'creake:my_designs' %}"
           style="flex:1;padding:11px;border:2px solid #f0b9b5;background:white;color:var(--coral);border-radius:10px;font-weight:700;font-size:13px;text-align:center;text-decoration:none;">
          Cancel
        </a>
        <button type="submit" class="pf-save" style="flex:2;">&#9999;&#65039; Save Changes</button>
      </div>
    </form>
  </div>
</div>

{% endblock %}
